<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filament Tracker</title>
<style>
  :root {
    --navy: #1b2a6b;
    --teal: #0e7c7b;
    --bg: #eef1f7;
  }
  body { font-family: Arial, sans-serif; background:var(--bg); margin:0; padding:20px; }
  .logo-wrap { text-align:center; margin-bottom:10px; }
  .logo-wrap img { height:80px; }
  h1 { text-align:center; color:var(--navy); margin-top:0; }
  .form-box, .filament {
    background:#fff; border-radius:8px; padding:15px; margin:10px auto; max-width:500px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1); border-top:4px solid var(--teal);
  }
  label { display:block; margin-top:8px; font-weight:bold; color:var(--navy); }
  input, select { width:100%; padding:8px; margin-top:4px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px; }
  button { margin-top:10px; padding:10px; border:none; border-radius:5px; cursor:pointer; }
  .add-btn { background:var(--navy); color:#fff; width:100%; font-size:16px; }
  .use-btn { background:var(--teal); color:#fff; }
  .del-btn { background:#dc3545; color:#fff; }
  .filament h3 { margin:0 0 5px 0; color:var(--navy); display:flex; align-items:center; gap:8px; }
  .color-dot { display:inline-block; width:18px; height:18px; border-radius:50%; border:1px solid #ccc; flex-shrink:0; }
  .color-picker { -webkit-appearance:none; appearance:none; width:60px; height:42px; padding:0; border:1px solid #ccc; border-radius:4px; flex:0; cursor:pointer; margin-top:4px; }
  .color-picker::-webkit-color-swatch-wrapper { padding:0; }
  .color-picker::-webkit-color-swatch { border:none; border-radius:4px; }
  .bar-bg { background:#ddd; border-radius:5px; height:15px; overflow:hidden; margin:8px 0; }
  .bar-fill { background:linear-gradient(90deg, var(--navy), var(--teal)); height:100%; }
  .row { display:flex; gap:8px; align-items:center; }
  .row input { flex:1; }
  .empty { text-align:center; color:#999; }
  .use-row { display:none; gap:8px; margin-top:8px; }
  .use-row.active { display:flex; }
  .warn { color:#dc3545; font-size:13px; margin-top:5px; }
  .del-confirm { display:none; gap:8px; margin-top:8px; align-items:center; }
  .del-confirm.active { display:flex; }
  .del-confirm span { flex:1; color:#dc3545; font-size:14px; }
  .yes-btn { background:#dc3545; color:#fff; }
  .no-btn { background:#6c757d; color:#fff; }
  .add-loc-row { display:flex; gap:8px; }
  .add-loc-row button { background:var(--teal); color:#fff; white-space:nowrap; }
  .location-group {
    max-width:500px; margin:15px auto; background:#fff; border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1); overflow:hidden;
  }
  .location-header {
    background:var(--navy); color:#fff; padding:12px 15px; font-weight:bold;
    cursor:pointer; display:flex; justify-content:space-between; align-items:center;
  }
  .location-header .arrow { transition: transform 0.2s; }
  .location-header.open .arrow { transform: rotate(90deg); }
  .location-body { display:none; padding:10px; }
  .location-body.open { display:block; }
  .location-body .filament { margin:10px 0; border-top-color:var(--teal); }
  .ams-unit {
    max-width:500px; margin:15px auto; background:#fff; border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1); overflow:hidden; border-top:4px solid var(--navy);
  }
  .ams-header {
    background:var(--navy); color:#fff; padding:12px 15px; font-weight:bold;
    display:flex; justify-content:space-between; align-items:center;
  }
  .ams-body { padding:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .ams-slot {
    border:1px dashed #bbb; border-radius:6px; padding:10px; min-height:60px;
    display:flex; flex-direction:column; gap:6px; justify-content:center;
  }
  .ams-slot.filled { border:1px solid var(--teal); }
  .ams-slot .slot-label { font-size:12px; color:#888; font-weight:bold; }
  .ams-add-row { display:flex; gap:8px; max-width:500px; margin:15px auto; }
  .ams-add-row input { flex:1; }
  .ams-add-row button { background:var(--navy); color:#fff; white-space:nowrap; }
</style>
</head>
<body>

<div class="logo-wrap">
  <img src="Logo%20(1000x1000).png" alt="Martrick Lab" />
</div>

<h1>Filament Tracker</h1>

<div class="form-box">
  <label>Type</label>
  <select id="type">
    <option>PLA</option>
    <option>PETG</option>
    <option>ABS</option>
    <option>TPU</option>
    <option>ASA</option>
    <option>Nylon</option>
  </select>

  <label>Mærke</label>
  <input id="brand" type="text" placeholder="f.eks. Sunlu">

  <label>Farve</label>
  <select id="color" onchange="toggleCustomColor()">
    <option>Sort</option>
    <option>Hvid</option>
    <option>Grå</option>
    <option>Rød</option>
    <option>Blå</option>
    <option>Grøn</option>
    <option>Gul</option>
    <option>Orange</option>
    <option>Lilla</option>
    <option>Pink</option>
    <option>Brun</option>
    <option>Transparent</option>
    <option value="Andet">Andet (skriv selv)</option>
  </select>
  <div class="row" id="customColorRow" style="display:none; margin-top:6px;">
    <input id="customColor" type="text" placeholder="Skriv farve">
    <input id="customColorHex" type="color" value="#888888" class="color-picker">
  </div>

  <label>Lagerplads</label>
  <select id="location"></select>
  <div class="add-loc-row">
    <input id="newLocation" type="text" placeholder="Ny lagerplads, f.eks. Reol A">
    <button type="button" onclick="addLocation()">Opret</button>
  </div>

  <label>Størrelse på rulle (gram)</label>
  <input id="weight" type="number" step="1" placeholder="f.eks. 1000">

  <button class="add-btn" type="button" onclick="addFilament()">Tilføj filament</button>
  <div id="addWarn" class="warn"></div>
</div>

<div class="ams-add-row">
  <input id="newAms" type="text" placeholder="Navn på ny AMS, f.eks. AMS 1">
  <button type="button" onclick="addAms()">Opret AMS</button>
</div>

<div id="amsList"></div>

<div id="list"></div>

<script>
  let filaments = [];
  let locations = [];
  let amsUnits = [];

  try {
    filaments = JSON.parse(localStorage.getItem('filaments') || '[]');
    locations = JSON.parse(localStorage.getItem('locations') || '[]');
    amsUnits = JSON.parse(localStorage.getItem('amsUnits') || '[]');
  } catch (e) {}

  function save() {
    try {
      localStorage.setItem('filaments', JSON.stringify(filaments));
      localStorage.setItem('locations', JSON.stringify(locations));
      localStorage.setItem('amsUnits', JSON.stringify(amsUnits));
    } catch (e) {}
  }

  function findAmsSlot(filamentId) {
    for (const ams of amsUnits) {
      const idx = ams.slots.indexOf(filamentId);
      if (idx !== -1) return { ams, idx };
    }
    return null;
  }

  function addAms() {
    const input = document.getElementById('newAms');
    const name = input.value.trim();
    if (!name) return;

    amsUnits.push({ id: Date.now(), name, slots: [null, null, null, null] });
    input.value = '';
    save();
    render();
  }

  function deleteAms(amsId) {
    amsUnits = amsUnits.filter(a => a.id !== amsId);
    save();
    render();
  }

  function assignToAms(amsId, slotIdx, filamentId) {
    if (!filamentId) return;
    filamentId = Number(filamentId);

    const existing = findAmsSlot(filamentId);
    if (existing) existing.ams.slots[existing.idx] = null;

    const ams = amsUnits.find(a => a.id === amsId);
    ams.slots[slotIdx] = filamentId;

    save();
    render();
  }

  function removeFromAms(amsId, slotIdx) {
    const ams = amsUnits.find(a => a.id === amsId);
    ams.slots[slotIdx] = null;
    save();
    render();
  }

  const colorMap = {
    'sort':'#1a1a1a','hvid':'#f5f5f5','grå':'#9e9e9e','rød':'#d32f2f',
    'blå':'#1976d2','grøn':'#388e3c','gul':'#fbc02d','orange':'#f57c00',
    'lilla':'#7b1fa2','pink':'#e91e63','brun':'#6d4c2f','transparent':'#e0e0e0'
  };

  function colorToHex(name) {
    return colorMap[(name || '').toLowerCase()] || '#888888';
  }

  function toggleCustomColor() {
    const isOther = document.getElementById('color').value === 'Andet';
    document.getElementById('customColorRow').style.display = isOther ? 'flex' : 'none';
  }

  function addLocation() {
    const input = document.getElementById('newLocation');
    const name = input.value.trim();
    if (!name || locations.includes(name)) return;

    locations.push(name);
    input.value = '';
    save();
    renderLocations();
  }

  function renderLocations() {
    const select = document.getElementById('location');
    const current = select.value;
    select.innerHTML = '';

    if (locations.length === 0) {
      select.innerHTML = '<option value="">Ingen lagerpladser oprettet</option>';
      return;
    }

    locations.forEach(loc => {
      const opt = document.createElement('option');
      opt.value = loc;
      opt.textContent = loc;
      select.appendChild(opt);
    });

    if (locations.includes(current)) select.value = current;
  }

  function addFilament() {
    const type = document.getElementById('type').value;
    const brand = document.getElementById('brand').value || '-';
    const location = document.getElementById('location').value || 'Ikke valgt';
    let color = document.getElementById('color').value;
    let colorHex;
    if (color === 'Andet') {
      color = document.getElementById('customColor').value.trim() || '-';
      colorHex = colorMap[color.toLowerCase()] || document.getElementById('customColorHex').value;
    } else {
      colorHex = colorToHex(color);
    }
    const weight = parseFloat(document.getElementById('weight').value);
    const warn = document.getElementById('addWarn');

    if (!weight || weight <= 0) {
      warn.textContent = 'Indtast en gyldig størrelse for rullen.';
      return;
    }
    warn.textContent = '';

    filaments.push({
      id: Date.now(),
      type, brand, color, colorHex, location,
      total: weight,
      remaining: weight
    });

    document.getElementById('brand').value = '';
    document.getElementById('color').value = 'Sort';
    document.getElementById('customColor').value = '';
    document.getElementById('customColor').style.display = 'none';
    document.getElementById('weight').value = '';

    save();
    render();
  }

  function toggleUseRow(id) {
    const row = document.getElementById('use-' + id);
    row.classList.toggle('active');
  }

  function confirmUse(id) {
    const input = document.getElementById('use-input-' + id);
    const used = parseFloat(input.value);
    if (isNaN(used) || used <= 0) return;

    const f = filaments.find(x => x.id === id);
    f.remaining -= used;
    if (f.remaining < 0) f.remaining = 0;

    save();
    render();
  }

  function toggleDeleteConfirm(id) {
    const row = document.getElementById('del-' + id);
    row.classList.toggle('active');
  }

  function deleteFilament(id) {
    filaments = filaments.filter(x => x.id !== id);
    save();
    render();
  }

  function filamentHtml(f) {
    const percent = Math.max(0, Math.min(100, (f.remaining / f.total) * 100));
    return `
      <div class="filament">
        <h3><span class="color-dot" style="background:${f.colorHex || colorToHex(f.color)}"></span>${f.type} - ${f.brand || '-'} - ${f.color}</h3>
        <div>${f.remaining.toFixed(0)} g / ${f.total.toFixed(0)} g tilbage</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${percent}%"></div></div>
        <div class="row">
          <button class="use-btn" type="button" onclick="toggleUseRow(${f.id})">Brugt filament</button>
          <button class="del-btn" type="button" onclick="toggleDeleteConfirm(${f.id})">Slet</button>
        </div>
        <div class="use-row" id="use-${f.id}">
          <input type="number" step="1" id="use-input-${f.id}" placeholder="g brugt">
          <button class="use-btn" type="button" onclick="confirmUse(${f.id})">OK</button>
        </div>
        <div class="del-confirm" id="del-${f.id}">
          <span>Er du sikker på du vil slette denne rulle?</span>
          <button class="yes-btn" type="button" onclick="deleteFilament(${f.id})">Ja, slet</button>
          <button class="no-btn" type="button" onclick="toggleDeleteConfirm(${f.id})">Annuller</button>
        </div>
      </div>
    `;
  }

  function toggleLocationGroup(key) {
    document.getElementById('loc-header-' + key).classList.toggle('open');
    document.getElementById('loc-body-' + key).classList.toggle('open');
  }

  function renderAms() {
    const amsList = document.getElementById('amsList');
    amsList.innerHTML = '';

    const assignedIds = new Set();
    amsUnits.forEach(ams => ams.slots.forEach(id => { if (id) assignedIds.add(id); }));

    const available = filaments.filter(f => !assignedIds.has(f.id));

    amsUnits.forEach(ams => {
      const div = document.createElement('div');
      div.className = 'ams-unit';

      const slotsHtml = ams.slots.map((filamentId, idx) => {
        if (filamentId) {
          const f = filaments.find(x => x.id === filamentId);
          if (!f) return `<div class="ams-slot"><div class="slot-label">Slot ${idx + 1}</div></div>`;
          return `
            <div class="ams-slot filled">
              <div class="slot-label">Slot ${idx + 1}</div>
              <div style="display:flex; align-items:center; gap:6px;">
                <span class="color-dot" style="background:${f.colorHex || colorToHex(f.color)}"></span>
                <span>${f.type} - ${f.brand || '-'} - ${f.color}</span>
              </div>
              <div>${f.remaining.toFixed(0)} g tilbage</div>
              <button class="del-btn" type="button" onclick="removeFromAms(${ams.id}, ${idx})">Fjern (tilbage til ${f.location})</button>
            </div>
          `;
        }

        const options = available.map(f =>
          `<option value="${f.id}">${f.type} - ${f.brand || '-'} - ${f.color} (${f.location})</option>`
        ).join('');

        return `
          <div class="ams-slot">
            <div class="slot-label">Slot ${idx + 1} - Tom</div>
            <select onchange="assignToAms(${ams.id}, ${idx}, this.value)">
              <option value="">Vælg filament...</option>
              ${options}
            </select>
          </div>
        `;
      }).join('');

      div.innerHTML = `
        <div class="ams-header">
          <span>${ams.name}</span>
          <button class="del-btn" type="button" style="margin:0;" onclick="deleteAms(${ams.id})">Slet AMS</button>
        </div>
        <div class="ams-body">${slotsHtml}</div>
      `;
      amsList.appendChild(div);
    });
  }

  function render() {
    renderAms();

    const list = document.getElementById('list');
    list.innerHTML = '';

    const assignedIds = new Set();
    amsUnits.forEach(ams => ams.slots.forEach(id => { if (id) assignedIds.add(id); }));
    const unassigned = filaments.filter(f => !assignedIds.has(f.id));

    if (unassigned.length === 0) {
      list.innerHTML = '<p class="empty">Ingen filamenter i lager.</p>';
      return;
    }

    const groups = {};
    unassigned.forEach(f => {
      const loc = f.location || 'Ikke valgt';
      if (!groups[loc]) groups[loc] = [];
      groups[loc].push(f);
    });

    Object.keys(groups).forEach((loc, i) => {
      const key = 'g' + i;
      const div = document.createElement('div');
      div.className = 'location-group';
      div.innerHTML = `
        <div class="location-header" id="loc-header-${key}" onclick="toggleLocationGroup('${key}')">
          <span>${loc} (${groups[loc].length})</span>
          <span class="arrow">&#9656;</span>
        </div>
        <div class="location-body" id="loc-body-${key}">
          ${groups[loc].map(filamentHtml).join('')}
        </div>
      `;
      list.appendChild(div);
    });
  }

  renderLocations();
  render();
</script>

</body>
</html>
